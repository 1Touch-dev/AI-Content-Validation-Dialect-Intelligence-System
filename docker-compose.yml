version: '3.8'

services:
  api_server:
    build: .
    container_name: video-validator-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./videos:/app/videos
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      - MODEL_PATH=/app/models/honduras_dialect_binary_classifier
      - LOG_PATH=/app/logs/video_validation.log
      - VALIDATION_THRESHOLD=0.7
    command: uvicorn services.api_server:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  monitoring_dashboard:
    build: .
    container_name: video-validation-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./videos:/app/videos
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    command: streamlit run monitoring/system_dashboard.py
    restart: unless-stopped
