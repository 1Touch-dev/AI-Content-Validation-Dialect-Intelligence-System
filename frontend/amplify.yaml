version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        - npm ci
        - echo "Node version:" && node --version
        - echo "NPM version:" && npm --version
    build:
      commands:
        # Set NEXT_PUBLIC_API_URL: use Amplify Console value, or change DEFAULT_API_URL below.
        # Must create .env.production AND export in same shell as "npm run build" so Next.js sees it.
        - |
          DEFAULT_FASTAPI_BASE_URL="https://api.theinvictus.group"
          export NEXT_PUBLIC_FASTAPI_BASE_URL="${NEXT_PUBLIC_FASTAPI_BASE_URL:-$DEFAULT_FASTAPI_BASE_URL}"
          echo "NEXT_PUBLIC_FASTAPI_BASE_URL=$NEXT_PUBLIC_FASTAPI_BASE_URL" > .env.production
          env | grep -E '^NEXT_PUBLIC_' | grep -v '^NEXT_PUBLIC_FASTAPI_BASE_URL=' >> .env.production 2>/dev/null || true
          echo "Build using API URL: $NEXT_PUBLIC_FASTAPI_BASE_URL"
          npm run build
          echo "Build completed successfully"
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
